<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 불규칙 동사 마스터</title>
    <!-- Tailwind CSS (모던하고 깔끔한 디자인을 위한 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti (신나는 폭죽 효과) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 구글 폰트 (Pretendard 느낌의 깔끔한 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">

    <!-- 헤더 섹션 -->
    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 drop-shadow-sm">
            🚀 불규칙 동사 마스터
        </h1>
        <p class="text-slate-500 font-medium text-lg">3단 변화를 게임처럼 재밌게 정복해보자!</p>
    </header>

    <!-- 네비게이션 탭 -->
    <nav class="flex flex-wrap justify-center gap-3 mb-8 w-full max-w-3xl">
        <button onclick="switchTab('learn')" id="btn-learn" class="nav-btn px-6 py-3 rounded-full font-bold text-white bg-indigo-500 shadow-lg shadow-indigo-200 transform transition hover:-translate-y-1 hover:bg-indigo-600 focus:outline-none">
            📖 학습하기
        </button>
        <button onclick="switchTab('quiz')" id="btn-quiz" class="nav-btn px-6 py-3 rounded-full font-bold text-slate-600 bg-white shadow-md transform transition hover:-translate-y-1 hover:text-purple-600 focus:outline-none">
            📝 형성평가
        </button>
        <button onclick="switchTab('game')" id="btn-game" class="nav-btn px-6 py-3 rounded-full font-bold text-slate-600 bg-white shadow-md transform transition hover:-translate-y-1 hover:text-pink-600 focus:outline-none">
            ⚡ 스피드 게임
        </button>
    </nav>

    <!-- 메인 컨테이너 -->
    <main class="w-full max-w-4xl glass-card rounded-3xl p-6 md:p-10">
        
        <!-- 1. 학습하기 섹션 -->
        <div id="learn" class="tab-content active">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-2xl font-bold text-indigo-900">📚 3단 변화표 한눈에 보기</h2>
                <span class="text-sm font-bold bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full hidden md:inline-block">유형별 모아보기</span>
            </div>
            
            <div id="learn-tables-container" class="space-y-8">
                <!-- JS로 각 유형별 테이블 데이터 삽입 -->
            </div>
        </div>

        <!-- 2. 형성평가 섹션 -->
        <div id="quiz" class="tab-content">
            <h2 class="text-2xl font-bold text-purple-900 mb-2">🎯 실력 점검 퀴즈</h2>
            <p class="text-slate-500 mb-6">빈칸에 알맞은 과거형 또는 과거분사형을 입력하세요.</p>
            
            <div id="quiz-container" class="space-y-4">
                <!-- JS로 퀴즈 삽입 -->
            </div>

            <div class="mt-8 text-center">
                <button onclick="checkQuiz()" class="px-8 py-3 bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all">
                    채점하기 ✨
                </button>
            </div>
            <div id="quiz-result" class="mt-6 text-center text-xl font-bold rounded-xl p-4 hidden"></div>
        </div>

        <!-- 3. 스피드 게임 섹션 -->
        <div id="game" class="tab-content">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-pink-600 mb-2">⚡ 30초 스피드 타이핑</h2>
                <p class="text-slate-500">주어진 동사의 과거형과 과거분사를 빠르게 입력하세요!</p>
            </div>

            <div id="game-start-screen" class="text-center py-10">
                <div class="text-6xl mb-6">⏳</div>
                <button onclick="startGame()" class="px-10 py-4 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xl font-bold rounded-2xl shadow-xl hover:scale-105 transition-transform animate-pulse">
                    게임 시작하기!
                </button>
            </div>

            <div id="game-play-screen" class="hidden">
                <div class="flex justify-between items-center bg-slate-100 p-4 rounded-2xl mb-8">
                    <div class="text-lg font-bold text-slate-600">점수: <span id="game-score" class="text-rose-500 text-2xl">0</span></div>
                    <div class="text-lg font-bold text-slate-600 flex items-center gap-2">
                        ⏱️ <span id="time-left" class="text-rose-500 text-3xl font-black">30</span>초
                    </div>
                </div>

                <div class="text-center bg-white border-2 border-pink-100 rounded-3xl p-8 shadow-sm relative overflow-hidden">
                    <div id="game-feedback" class="absolute inset-0 bg-green-400 opacity-0 transition-opacity duration-300 pointer-events-none"></div>
                    
                    <p id="game-meaning" class="text-slate-400 font-bold mb-2 text-lg"></p>
                    <h3 id="game-word" class="text-5xl md:text-6xl font-black text-indigo-900 mb-8 tracking-wider"></h3>
                    
                    <div class="flex flex-col md:flex-row justify-center gap-4 max-w-lg mx-auto">
                        <input type="text" id="game-past" placeholder="과거형 (Past)" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none text-center text-xl font-bold transition-colors">
                        <input type="text" id="game-pp" placeholder="과거분사 (P.P)" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-pink-400 focus:ring-4 focus:ring-pink-100 outline-none text-center text-xl font-bold transition-colors">
                    </div>
                    
                    <p class="text-slate-400 text-sm mt-6">입력 후 <kbd class="bg-slate-100 px-2 py-1 rounded border">Enter</kbd> 키를 누르세요</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 동사 데이터
        const verbData = [
            // A-A-A 형
            { type: "A-A-A", base: "cost", past: "cost", pp: "cost", meaning: "비용이 들다" },
            { type: "A-A-A", base: "cut", past: "cut", pp: "cut", meaning: "자르다" },
            { type: "A-A-A", base: "hit", past: "hit", pp: "hit", meaning: "치다" },
            { type: "A-A-A", base: "hurt", past: "hurt", pp: "hurt", meaning: "다치게 하다" },
            { type: "A-A-A", base: "put", past: "put", pp: "put", meaning: "놓다" },
            { type: "A-A-A", base: "read", past: "read", pp: "read", meaning: "읽다" },
            { type: "A-A-A", base: "set", past: "set", pp: "set", meaning: "두다, 설정하다" },
            
            // A-B-A 형
            { type: "A-B-A", base: "come", past: "came", pp: "come", meaning: "오다" },
            { type: "A-B-A", base: "become", past: "became", pp: "become", meaning: "~이 되다" },
            { type: "A-B-A", base: "run", past: "ran", pp: "run", meaning: "달리다" },
            
            // A-B-B 형
            { type: "A-B-B", base: "bring", past: "brought", pp: "brought", meaning: "가져오다" },
            { type: "A-B-B", base: "build", past: "built", pp: "built", meaning: "짓다" },
            { type: "A-B-B", base: "buy", past: "bought", pp: "bought", meaning: "사다" },
            { type: "A-B-B", base: "catch", past: "caught", pp: "caught", meaning: "붙잡다" },
            { type: "A-B-B", base: "feel", past: "felt", pp: "felt", meaning: "느끼다" },
            { type: "A-B-B", base: "find", past: "found", pp: "found", meaning: "찾다" },
            { type: "A-B-B", base: "have", past: "had", pp: "had", meaning: "가지다" },
            { type: "A-B-B", base: "make", past: "made", pp: "made", meaning: "만들다" },
            { type: "A-B-B", base: "meet", past: "met", pp: "met", meaning: "만나다" },
            { type: "A-B-B", base: "say", past: "said", pp: "said", meaning: "말하다" },
            { type: "A-B-B", base: "teach", past: "taught", pp: "taught", meaning: "가르치다" },
            { type: "A-B-B", base: "think", past: "thought", pp: "thought", meaning: "생각하다" },
            
            // A-B-C 형
            { type: "A-B-C", base: "be", past: "was/were", pp: "been", meaning: "이다, 있다" },
            { type: "A-B-C", base: "begin", past: "began", pp: "begun", meaning: "시작하다" },
            { type: "A-B-C", base: "break", past: "broke", pp: "broken", meaning: "깨다" },
            { type: "A-B-C", base: "do", past: "did", pp: "done", meaning: "하다" },
            { type: "A-B-C", base: "drink", past: "drank", pp: "drunk", meaning: "마시다" },
            { type: "A-B-C", base: "eat", past: "ate", pp: "eaten", meaning: "먹다" },
            { type: "A-B-C", base: "give", past: "gave", pp: "given", meaning: "주다" },
            { type: "A-B-C", base: "go", past: "went", pp: "gone", meaning: "가다" },
            { type: "A-B-C", base: "know", past: "knew", pp: "known", meaning: "알다" },
            { type: "A-B-C", base: "see", past: "saw", pp: "seen", meaning: "보다" },
            { type: "A-B-C", base: "take", past: "took", pp: "taken", meaning: "가져가다" },
            { type: "A-B-C", base: "write", past: "wrote", pp: "written", meaning: "쓰다" }
        ];

        // 탭 전환 로직
        function switchTab(tabId) {
            // 컨텐츠 숨기기/보이기
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 버튼 스타일 업데이트
            const buttons = {
                'learn': { btn: 'btn-learn', colorClass: 'bg-indigo-500', textClass: 'text-white' },
                'quiz': { btn: 'btn-quiz', colorClass: 'bg-purple-500', textClass: 'text-white' },
                'game': { btn: 'btn-game', colorClass: 'bg-pink-500', textClass: 'text-white' }
            };

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn px-6 py-3 rounded-full font-bold text-slate-600 bg-white shadow-md transform transition hover:-translate-y-1 focus:outline-none";
            });

            const activeBtn = document.getElementById(buttons[tabId].btn);
            activeBtn.classList.remove('bg-white', 'text-slate-600');
            activeBtn.classList.add(buttons[tabId].colorClass, buttons[tabId].textClass, 'shadow-lg');

            // 탭별 초기화 로직
            if (tabId === 'learn') renderTable();
            if (tabId === 'quiz') initQuiz();
            if (tabId === 'game') resetGameScreen();
        }

        // 1. 학습 표 렌더링
        function renderTable() {
            const container = document.getElementById('learn-tables-container');
            // 수정된 부분: 텍스트나 주석이 아닌, 실제 HTML 태그(표)가 들어있는지 확인하도록 변경했습니다.
            if (container.children.length > 0) return; // 이미 렌더링 된 경우 스킵
            
            const types = ["A-A-A", "A-B-A", "A-B-B", "A-B-C"];
            const typeDescriptions = {
                "A-A-A": "원형 - 과거형 - 과거분사형이 모두 같은 동사",
                "A-B-A": "원형과 과거분사형이 같은 동사",
                "A-B-B": "과거형과 과거분사형이 같은 동사",
                "A-B-C": "원형 - 과거형 - 과거분사형이 모두 다른 동사"
            };

            let html = '';
            
            types.forEach(type => {
                const filteredVerbs = verbData.filter(v => v.type === type);
                if (filteredVerbs.length === 0) return;

                html += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-indigo-50 p-4 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between">
                            <h3 class="text-xl font-black text-indigo-700">${type} 형</h3>
                            <span class="text-sm text-indigo-500 font-bold bg-white px-3 py-1 rounded-full shadow-sm">${typeDescriptions[type]}</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse min-w-[500px]">
                                <thead>
                                    <tr class="bg-slate-50 text-slate-600 text-sm">
                                        <th class="p-3 pl-5 font-bold border-b border-slate-100 w-1/4">원형 (Base)</th>
                                        <th class="p-3 font-bold border-b border-slate-100 w-1/4">과거형 (Past)</th>
                                        <th class="p-3 font-bold border-b border-slate-100 w-1/4">과거분사 (P.P)</th>
                                        <th class="p-3 pr-5 font-bold border-b border-slate-100 w-1/4">의미</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                `;

                filteredVerbs.forEach((v, index) => {
                    const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-slate-50/50';
                    html += `
                        <tr class="${bgClass} hover:bg-indigo-50/50 transition-colors">
                            <td class="p-3 pl-5 border-b border-slate-50 text-lg font-black text-indigo-600">${v.base}</td>
                            <td class="p-3 border-b border-slate-50 font-medium text-slate-700">${v.past}</td>
                            <td class="p-3 border-b border-slate-50 font-medium text-slate-700">${v.pp}</td>
                            <td class="p-3 pr-5 border-b border-slate-50 text-slate-500">${v.meaning}</td>
                        </tr>
                    `;
                });

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 2. 퀴즈 로직
        let quizAnswers = [];
        function initQuiz() {
            const container = document.getElementById('quiz-container');
            const resultBox = document.getElementById('quiz-result');
            container.innerHTML = '';
            resultBox.classList.add('hidden');
            quizAnswers = [];
            
            // 랜덤 5문제
            const shuffled = [...verbData].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            shuffled.forEach((v, index) => {
                const isPastBlank = Math.random() > 0.5;
                quizAnswers.push({
                    answer: isPastBlank ? v.past : v.pp,
                    isPast: isPastBlank
                });
                
                container.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col md:flex-row items-center gap-4 hover:shadow-md transition-shadow">
                        <div class="bg-purple-100 text-purple-700 font-bold w-10 h-10 rounded-full flex items-center justify-center shrink-0">
                            ${index + 1}
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <span class="text-sm text-slate-400 font-bold block mb-1">뜻: ${v.meaning}</span>
                            <div class="text-xl flex items-center justify-center md:justify-start gap-3 flex-wrap">
                                <span class="font-black text-slate-800">${v.base}</span>
                                <span class="text-slate-300">→</span>
                                ${isPastBlank ? 
                                    `<input type="text" id="quiz-q${index}" class="w-32 px-3 py-1 text-center border-b-2 border-purple-300 focus:border-purple-600 outline-none bg-purple-50 text-purple-900 font-bold rounded-t-md" placeholder="과거형">` : 
                                    `<span class="font-medium text-slate-600">${v.past}</span>`}
                                <span class="text-slate-300">→</span>
                                ${!isPastBlank ? 
                                    `<input type="text" id="quiz-q${index}" class="w-32 px-3 py-1 text-center border-b-2 border-purple-300 focus:border-purple-600 outline-none bg-purple-50 text-purple-900 font-bold rounded-t-md" placeholder="과거분사">` : 
                                    `<span class="font-medium text-slate-600">${v.pp}</span>`}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function checkQuiz() {
            let score = 0;
            quizAnswers.forEach((q, index) => {
                const inputEl = document.getElementById(`quiz-q${index}`);
                const userInput = inputEl.value.trim().toLowerCase();
                const isCorrect = q.answer.includes('/') ? q.answer.split('/').includes(userInput) : userInput === q.answer.toLowerCase();
                
                if(isCorrect) {
                    score++;
                    inputEl.classList.remove('bg-purple-50', 'border-purple-300', 'bg-red-50', 'border-red-400');
                    inputEl.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                } else {
                    inputEl.classList.remove('bg-purple-50', 'border-purple-300');
                    inputEl.classList.add('bg-red-50', 'border-red-400', 'text-red-600', 'shake');
                    setTimeout(() => inputEl.classList.remove('shake'), 500);
                }
            });

            const resultBox = document.getElementById('quiz-result');
            resultBox.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-orange-100', 'text-orange-700');
            
            if (score === 5) {
                resultBox.innerText = `🎉 완벽합니다! 5문제 모두 정답!`;
                resultBox.classList.add('bg-green-100', 'text-green-700');
                fireConfetti();
            } else {
                resultBox.innerText = `🤔 5문제 중 ${score}문제를 맞췄습니다. 다시 시도해보세요!`;
                resultBox.classList.add('bg-orange-100', 'text-orange-700');
            }
        }

        // 3. 게임 로직
        let gameTimer;
        let timeLeft = 30;
        let score = 0;
        let gameWords = [];
        let currentWordIndex = 0;
        let isGameRunning = false;

        function resetGameScreen() {
            document.getElementById('game-start-screen').classList.remove('hidden');
            document.getElementById('game-play-screen').classList.add('hidden');
            clearInterval(gameTimer);
            isGameRunning = false;
        }

        function startGame() {
            document.getElementById('game-start-screen').classList.add('hidden');
            document.getElementById('game-play-screen').classList.remove('hidden');
            
            gameWords = [...verbData].sort(() => 0.5 - Math.random()); // 셔플
            score = 0;
            timeLeft = 30;
            currentWordIndex = 0;
            isGameRunning = true;
            
            updateScoreTime();
            nextGameWord();
            
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                updateScoreTime();
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateScoreTime() {
            document.getElementById('game-score').innerText = score;
            const timeEl = document.getElementById('time-left');
            timeEl.innerText = timeLeft;
            if(timeLeft <= 5) {
                timeEl.classList.add('text-red-600', 'animate-ping');
            } else {
                timeEl.classList.remove('text-red-600', 'animate-ping');
            }
        }

        function nextGameWord() {
            if(currentWordIndex >= gameWords.length) {
                // 단어를 다 소진하면 다시 셔플해서 계속 이어서 하도록 (무한 모드 30초 내)
                gameWords = [...verbData].sort(() => 0.5 - Math.random());
                currentWordIndex = 0;
            }
            
            const v = gameWords[currentWordIndex];
            document.getElementById('game-word').innerText = v.base;
            document.getElementById('game-meaning').innerText = `뜻: ${v.meaning}`;
            
            const pastInput = document.getElementById('game-past');
            const ppInput = document.getElementById('game-pp');
            pastInput.value = '';
            ppInput.value = '';
            pastInput.focus();
        }

        function submitGameAnswer() {
            if(!isGameRunning) return;

            const v = gameWords[currentWordIndex];
            const pastInputEl = document.getElementById('game-past');
            const ppInputEl = document.getElementById('game-pp');
            
            const pastInput = pastInputEl.value.trim().toLowerCase();
            const ppInput = ppInputEl.value.trim().toLowerCase();
            
            const pastCorrect = v.past.includes('/') ? v.past.split('/').includes(pastInput) : pastInput === v.past.toLowerCase();
            const ppCorrect = v.pp.toLowerCase() === ppInput;

            if(pastCorrect && ppCorrect) {
                // 정답 처리
                score += 10;
                updateScoreTime();
                
                // 정답 피드백 이펙트
                const feedback = document.getElementById('game-feedback');
                feedback.classList.remove('opacity-0');
                setTimeout(() => feedback.classList.add('opacity-0'), 150);
                
                currentWordIndex++;
                nextGameWord();
            } else {
                // 오답 처리
                pastInputEl.classList.add('shake', 'border-red-400');
                ppInputEl.classList.add('shake', 'border-red-400');
                setTimeout(() => {
                    pastInputEl.classList.remove('shake', 'border-red-400');
                    ppInputEl.classList.remove('shake', 'border-red-400');
                }, 500);
            }
        }

        function endGame() {
            clearInterval(gameTimer);
            isGameRunning = false;
            
            if(score > 0) fireConfetti();
            
            setTimeout(() => {
                alert(`⏰ 타임 오버!\n최종 점수는 [ ${score}점 ] 입니다.\n참 잘했어요!`);
                resetGameScreen();
            }, 100);
        }

        // 엔터키 지원 (게임 및 퀴즈)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('game').classList.contains('active') && isGameRunning) {
                    submitGameAnswer();
                } else if (document.getElementById('quiz').classList.contains('active')) {
                    checkQuiz();
                }
            }
        });

        // 폭죽 효과 함수
        function fireConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // 초기 실행
        renderTable();
    </script>
</body>
</html>
